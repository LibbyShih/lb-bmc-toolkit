{% extends "base.html" %}
{% block title %}Spec Ref · IPMI Inspector{% endblock %}
{% block content %}
<div class="card-title" style="margin-bottom:4px;">IPMI Spec Reference</div>
<div style="font-size:11px;color:var(--text-muted);margin-bottom:12px;">No connection required. Browse all IPMI commands with request/response field definitions.</div>
<div class="spec-ref-layout">
  <div id="spec-tree" class="spec-ref-tree"></div>
  <div id="spec-detail" class="spec-ref-detail">
    <div class="empty-state">Select a command from the left.</div>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script>
fetch(window.IPMI_BASE + '/api/spec/all').then(r=>r.json()).then(data => {
  if (!data.ok) return;
  const tree = document.getElementById('spec-tree');
  let html = '';
  for (const [netfnHex, group] of Object.entries(data.groups)) {
    html += `<div class="spec-tree-group">
      <div class="spec-tree-netfn"
           onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='none'?'':'none'">
        ${group.name} (${netfnHex})
      </div>
      <div class="spec-tree-cmds">`;
    group.commands.forEach(cmd => {
      html += `<div class="spec-tree-cmd"
                    onclick="showCmd(${JSON.stringify(cmd).replace(/"/g,'&quot;')})">
        ${cmd.name}
      </div>`;
    });
    html += '</div></div>';
  }
  tree.innerHTML = html;
}).catch(() => {
  document.getElementById('spec-tree').innerHTML = '<div class="empty-state">Spec data unavailable</div>';
});

function showCmd(cmd) {
  const detail = document.getElementById('spec-detail');
  let html = `<div class="card-title">${cmd.name}</div>`;
  html += `<div class="font-mono" style="color:var(--text-muted);font-size:11px;margin-bottom:8px;">NetFn ${cmd.netfn_hex} · Cmd ${cmd.cmd_hex}</div>`;
  if (cmd.desc) html += `<div style="margin-bottom:10px;color:var(--text-dim);font-size:13px;">${cmd.desc}</div>`;
  if (cmd.request_fields && cmd.request_fields.length) {
    html += '<div class="card-title" style="margin-bottom:6px;margin-top:12px;">Request Data</div>';
    html += '<table class="data-table"><thead><tr><th>Field</th><th>Bytes</th><th>Description</th></tr></thead><tbody>';
    cmd.request_fields.forEach(f => {
      html += `<tr><td>${f.name}</td><td>${f.length}</td><td style="font-size:11px;">${f.desc}</td></tr>`;
    });
    html += '</tbody></table>';
  }
  if (cmd.response_fields && cmd.response_fields.length) {
    html += '<div class="card-title" style="margin-top:12px;margin-bottom:6px;">Response Data</div>';
    html += '<table class="data-table"><thead><tr><th>Field</th><th>Offset</th><th>Bytes</th><th>Decode / Note</th></tr></thead><tbody>';
    cmd.response_fields.forEach(f => {
      html += `<tr><td>${f.name}</td><td>${f.offset}</td><td>${f.length}</td><td style="font-size:11px;">${f.note||f.decode}</td></tr>`;
    });
    html += '</tbody></table>';
  }
  if (!cmd.request_fields?.length && !cmd.response_fields?.length) {
    html += '<div style="color:var(--text-muted);font-size:12px;">No request or response data fields defined.</div>';
  }
  detail.innerHTML = html;
}
</script>
{% endblock %}
